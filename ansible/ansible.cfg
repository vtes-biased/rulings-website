[defaults]
roles_path = roles
collections_path = galaxy_collections   ; `just galaxy` installs requirements.yml here (incl. lionel_panhaleux.server_setup)
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
callback_result_format = yaml
forks = 10
interpreter_python = auto_silent
gathering = smart
callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer
; Set ANSIBLE_VAULT_PASSWORD_FILE=.production.vault_pass in your shell (or use the
; justfile recipes, which default it for you) rather than hard-coding it here.

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o ServerAliveInterval=30
