name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # The suite is hermetic (no SSH, no live rulings clone): conftest serves the vendored
    # snapshot as a local git remote and runs against a throwaway `vtes-rulings-test` DB it
    # creates/drops itself. The role therefore needs CREATEDB — the image superuser has it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vtes-rulings
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      # psycopg uses the pure-Python impl, which dlopens the system libpq at runtime.
      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"

      - name: Install npm dependencies
        run: npm install --include=dev

      - name: Build frontend
        run: npm run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"

      - name: Install python dependencies
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Typecheck
        run: uv run ty check --error-on-warning --output-format github

      - name: Test
        env:
          TESTING: "1"
        run: uv run pytest
