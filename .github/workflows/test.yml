name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"

      - name: Install npm dependencies
        run: npm install --include=dev

      - name: Build frontend
        run: npm run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install python dependencies
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Test
        env:
          QUART_TESTING: "1"
        run: uv run pytest
