name: Release

# Tag-driven artifact publishing. Pushing a `v*` tag runs the test suite, then (only
# if green) builds the wheel + sdist + pinned requirements and attaches them to a
# GitHub Release. Deploy is manual (`ansible/`): the deploy playbook fetches this
# Release's wheel itself. `just release` wraps the tag-and-push step.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: the same hermetic suite as test.yml (Postgres service + libpq), so a red tag
  # never publishes a Release.
  test:
    name: Test (gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vtes-rulings
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"

      - name: Install npm dependencies
        run: npm install --include=dev

      - name: Build frontend
        run: npm run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install python dependencies
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Typecheck
        run: uv run ty check --error-on-warning --output-format github

      - name: Test
        env:
          TESTING: "1"
        run: uv run pytest

  # Build the deployable artifacts and attach them to a GitHub Release. Only on a tag
  # push (workflow_dispatch runs the gate ad hoc without publishing).
  release:
    name: Build & publish artifacts
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the Release + upload assets
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"

      # The wheel bundles the compiled frontend (Vite outputs into the package's
      # static/dist), so build it before uv build.
      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        run: uv build --out-dir dist

      - name: Export pinned requirements
        run: uv export --frozen --no-dev --no-hashes --no-emit-project -o dist/requirements.txt

      - name: Create GitHub Release and attach artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" --verify-tag --generate-notes
          gh release upload "${{ github.ref_name }}" \
            dist/*.whl dist/*.tar.gz dist/requirements.txt --clobber
